{% extends "base.html" %}
{% block title %}Delete {{ title }} · TMS{% endblock %}
{% block content %}

<div class="topbar">
  <div>
    <h1>Delete {{ title }}</h1>
    <div class="subtitle">This action cannot be undone.</div>
  </div>
  <a href="{% url list_url_name %}" class="btn btn-outline-secondary">
    <i class="fa-solid fa-arrow-left me-1"></i> Back to list
  </a>
</div>

<div class="card-panel form-panel">
  <div class="alert alert-danger alert-persistent d-flex align-items-start gap-2">
    <i class="fa-solid fa-triangle-exclamation mt-1"></i>
    <div>
      Are you sure you want to delete <strong>{{ object }}</strong>?
      Any related records may also be affected.
    </div>
  </div>

  <form method="post" class="js-loading-submit">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger">
        <i class="fa-solid fa-trash me-1"></i> Yes, delete it
      </button>
      <a href="{% url list_url_name %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
